services:
  postgres:
    image: postgres:18

    container_name: jobwize-development-postgres

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: jobwize
      POSTGRES_USER: jobwize
      POSTGRES_PASSWORD: jobwize

    volumes:
      - postgres-data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobwize -d jobwize"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data: